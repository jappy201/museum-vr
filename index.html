<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Museum VR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }

    #overlay {
      position: fixed; inset: 0; background: #0a0a0a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; z-index: 999; color: #fff; text-align: center; padding: 40px;
    }
    #overlay h1 { font-size: 26px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; }
    #overlay p  { font-size: 14px; color: rgba(255,255,255,0.5); max-width: 280px; line-height: 1.7; }
    
    #btn-row {
      display: flex; gap: 15px; margin-top: 10px;
    }
    .enter-btn {
      background: #fff; color: #000; border: none; border-radius: 50px;
      padding: 16px 32px; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .enter-btn:disabled { opacity: 0.4; cursor: default; }
    
    #status { font-size: 12px; color: rgba(255,255,255,0.35); min-height: 18px; }
    #divider {
      position: fixed; top: 0; left: 50%; width: 2px; height: 100%;
      background: #000; z-index: 5; display: none; pointer-events: none;
    }
    #hud {
      position: fixed; bottom: 24px; width: 100%; text-align: center;
      color: rgba(255,255,255,0.35); font-size: 12px; letter-spacing: 1px;
      z-index: 10; display: none; pointer-events: none;
    }
    canvas { display: block; }
  </style>
</head>
<body>

  <div id="overlay">
    <h1>🏛️ Museum VR</h1>
    <p>Select an exhibit below, then place your phone in your Cardboard goggles.</p>
    
    <div id="btn-row">
      <button class="enter-btn" id="btn-exhibit1" disabled>Loading...</button>
      <button class="enter-btn" id="btn-exhibit2" disabled>Loading...</button>
    </div>
    
    <p id="status">Connecting…</p>
  </div>
  
  <div id="divider"></div>
  <div id="hud">MOVE YOUR HEAD TO LOOK AROUND</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader }   from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader }  from 'three/addons/loaders/DRACOLoader.js';
    import { StereoEffect } from 'three/addons/effects/StereoEffect.js';

    const GLB_URL = 'https://raw.githubusercontent.com/jappy201/museum-vr/main/ClaudeFinalCompress2.glb';

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const effect = new StereoEffect(renderer);
    effect.setSize(window.innerWidth, window.innerHeight);
    effect.setEyeSeparation(0.005); 

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    scene.add(new THREE.AmbientLight(0xffffff, 2.0));
    const key = new THREE.DirectionalLight(0xffffff, 0.8);
    key.position.set(5, 10, 5);
    scene.add(key);

    const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.01, 1000);
    let baseCamPos = new THREE.Vector3(0, 0, 0); 

    const camQuat     = new THREE.Quaternion();
    const orient      = new THREE.Euler();
    const worldAdjust = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));
    const screenQ     = new THREE.Quaternion();
    const Z_AXIS      = new THREE.Vector3(0, 0, 1);

    function onOrientation(evt) {
      if (evt.alpha == null) return;
      orient.set(
        THREE.MathUtils.degToRad(evt.beta  || 0),
        THREE.MathUtils.degToRad(evt.alpha || 0),
        THREE.MathUtils.degToRad(-(evt.gamma || 0)),
        'YXZ'
      );
      camQuat.setFromEuler(orient);
      camQuat.multiply(worldAdjust);
      const angle = window.screen?.orientation?.angle || 0;
      screenQ.setFromAxisAngle(Z_AXIS, -THREE.MathUtils.degToRad(angle));
      camQuat.multiply(screenQ);
    }

    let vrActive = false;

    (function animate() {
      requestAnimationFrame(animate);
      camera.quaternion.copy(camQuat);
      camera.position.copy(baseCamPos);

      if (vrActive) {
        effect.render(scene, camera);
      } else {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.render(scene, camera);
      }
    })();

    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);

    const statusEl = document.getElementById('status');
    const btn1     = document.getElementById('btn-exhibit1');
    const btn2     = document.getElementById('btn-exhibit2');

    loader.load(
      GLB_URL,
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(1.0);
        const box = new THREE.Box3().setFromObject(model);
        model.position.y = -box.min.y;
        scene.add(model);
        
        statusEl.textContent = '✓ Scan ready';
        
        btn1.textContent = 'Exhibit 1';
        btn1.disabled    = false;
        
        btn2.textContent = 'Exhibit 2';
        btn2.disabled    = false;
      },
      (xhr) => {
        statusEl.textContent = xhr.total
          ? `Loading… ${Math.round(xhr.loaded / xhr.total * 100)}%`
          : `Loading… ${(xhr.loaded / 1048576).toFixed(1)} MB`;
      },
      (err) => {
        statusEl.textContent = '⚠ Failed to load scan';
        btn1.textContent = 'Error';
        btn2.textContent = 'Error';
        console.error('GLB load error:', err);
      }
    );

    async function enterVRMode(exhibitNumber) {
      btn1.disabled = true;
      btn2.disabled = true;

      // The precise spawn points
      if (exhibitNumber === 1) {
        baseCamPos.set(0, 2.2, 10); 
      } else if (exhibitNumber === 2) {
        baseCamPos.set(4.026, 2.2, -8.637); // Locked in perfectly
      }

      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        let perm;
        try { perm = await DeviceOrientationEvent.requestPermission(); }
        catch (e) {
          alert('Could not request motion access. Try again.');
          btn1.disabled = false; btn2.disabled = false; return;
        }
        if (perm !== 'granted') {
          alert('Motion access denied.\n\nSettings → Safari → Motion & Orientation Access → enable.');
          btn1.disabled = false; btn2.disabled = false; return;
        }
      }

      window.addEventListener('deviceorientation', onOrientation, true);
      try { await document.documentElement.requestFullscreen?.(); } catch (_) {}
      try { await screen.orientation?.lock?.('landscape'); }         catch (_) {}

      document.getElementById('overlay').style.display = 'none';
      document.getElementById('divider').style.display = 'block';
      document.getElementById('hud').style.display     = 'block';
      vrActive = true;

      setTimeout(() => { document.getElementById('hud').style.display = 'none'; }, 4000);
    }

    btn1.addEventListener('click', () => enterVRMode(1));
    btn2.addEventListener('click', () => enterVRMode(2));

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      effect.setSize(window.innerWidth, window.innerHeight);
    });

  </script>
</body>
</html>
