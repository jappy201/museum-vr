<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Museum VR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── Overlay screen ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 999;
      color: #fff;
      text-align: center;
      padding: 40px;
    }

    #overlay h1 {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    #overlay .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      max-width: 280px;
      line-height: 1.7;
    }

    #enter-btn {
      background: #ffffff;
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 16px 52px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    #enter-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #load-status {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
      min-height: 18px;
    }

    /* ── HUD tip ── */
    #hud {
      position: fixed;
      bottom: 24px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 10;
      display: none;
      pointer-events: none;
    }

    /* ── Divider line between eyes ── */
    #divider {
      position: fixed;
      top: 0;
      left: 50%;
      width: 2px;
      height: 100%;
      background: #000;
      z-index: 5;
      display: none;
      pointer-events: none;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

  <div id="overlay">
    <h1>&#127963; Museum VR</h1>
    <p class="subtitle">
      Tap the button below, then place your phone into your cardboard goggles.<br><br>
      Move your head to look around the scan.
    </p>
    <button id="enter-btn" disabled>Loading scan…</button>
    <p id="load-status">Connecting…</p>
  </div>

  <div id="divider"></div>
  <div id="hud">MOVE YOUR HEAD TO LOOK AROUND</div>

  <!-- Three.js via import map (Safari 16.4+ / iOS 16.4+) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader }  from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    // ─────────────────────────────────────────────────────────────
    //  YOUR SCAN URL
    // ─────────────────────────────────────────────────────────────
    const GLB_URL =
      'https://raw.githubusercontent.com/jappy201/museum_vr/main/ClaudeFinalCompress2.glb';

    // ─────────────────────────────────────────────────────────────
    //  RENDERER
    // ─────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // ─────────────────────────────────────────────────────────────
    //  SCENE
    // ─────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    // Lighting — photogrammetry scans are baked so just ambient + mild key
    scene.add(new THREE.AmbientLight(0xffffff, 2.0));
    const key = new THREE.DirectionalLight(0xffffff, 0.8);
    key.position.set(5, 10, 5);
    scene.add(key);

    // ─────────────────────────────────────────────────────────────
    //  CAMERA
    // ─────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(
      80,                                    // wide FOV for cardboard
      window.innerWidth / window.innerHeight,
      0.01,
      1000
    );
    camera.position.set(0, 1.6, 0);          // standing eye height

    // ─────────────────────────────────────────────────────────────
    //  LOAD GLB  (Draco compressed)
    // ─────────────────────────────────────────────────────────────
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath(
      'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/'
    );

    const gltfLoader = new GLTFLoader();
    gltfLoader.setDRACOLoader(dracoLoader);

    const statusEl = document.getElementById('load-status');
    const btnEl    = document.getElementById('enter-btn');

    gltfLoader.load(
      GLB_URL,
      (gltf) => {
        const model = gltf.scene;

        // Auto-centre and scale to fit comfortably around the viewer
        const box    = new THREE.Box3().setFromObject(model);
        const centre = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = 4 / maxDim;           // fit into ~4 unit space

        model.scale.setScalar(scale);
        model.position.copy(centre).multiplyScalar(-scale);
        model.position.y -= 0.8;            // sink slightly so viewer feels inside

        scene.add(model);

        statusEl.textContent   = '✓ Scan ready';
        btnEl.textContent      = 'Tap to Enter VR';
        btnEl.disabled         = false;
      },
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          statusEl.textContent = `Loading… ${pct}%`;
        } else {
          const mb = (xhr.loaded / 1048576).toFixed(1);
          statusEl.textContent = `Loading… ${mb} MB`;
        }
      },
      (err) => {
        statusEl.textContent = '⚠ Failed to load scan — see console';
        btnEl.textContent    = 'Enter VR (scan missing)';
        btnEl.disabled       = false;
        console.error('GLB load error:', err);
      }
    );

    // ─────────────────────────────────────────────────────────────
    //  DEVICE ORIENTATION  →  QUATERNION  (3DoF)
    // ─────────────────────────────────────────────────────────────
    const camQuat      = new THREE.Quaternion();
    const orient       = new THREE.Euler();
    const worldAdjust  = new THREE.Quaternion(
      -Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)   // -90° around X to convert phone frame
    );
    const screenQ      = new THREE.Quaternion();
    const Z_AXIS       = new THREE.Vector3(0, 0, 1);

    function onOrientation(evt) {
      if (evt.alpha == null) return;

      const a = THREE.MathUtils.degToRad(evt.alpha || 0);
      const b = THREE.MathUtils.degToRad(evt.beta  || 0);
      const g = THREE.MathUtils.degToRad(evt.gamma || 0);

      orient.set(b, a, -g, 'YXZ');
      camQuat.setFromEuler(orient);
      camQuat.multiply(worldAdjust);

      // Compensate for screen rotation (landscape)
      const angle = window.screen?.orientation?.angle || 0;
      screenQ.setFromAxisAngle(Z_AXIS, -THREE.MathUtils.degToRad(angle));
      camQuat.multiply(screenQ);
    }

    // ─────────────────────────────────────────────────────────────
    //  STEREO RENDER  (side-by-side for cardboard)
    // ─────────────────────────────────────────────────────────────
    const HALF_IPD = 0.032;   // half of 64mm interpupillary distance

    function renderStereo() {
      const w     = renderer.domElement.width;
      const h     = renderer.domElement.height;
      const halfW = Math.floor(w / 2);

      camera.quaternion.copy(camQuat);
      camera.aspect = (halfW) / h;
      camera.updateProjectionMatrix();

      renderer.setScissorTest(true);

      // Left eye
      camera.position.set(-HALF_IPD, 1.6, 0);
      renderer.setViewport(0, 0, halfW, h);
      renderer.setScissor(0, 0, halfW, h);
      renderer.render(scene, camera);

      // Right eye
      camera.position.set(HALF_IPD, 1.6, 0);
      renderer.setViewport(halfW, 0, halfW, h);
      renderer.setScissor(halfW, 0, halfW, h);
      renderer.render(scene, camera);
    }

    // ─────────────────────────────────────────────────────────────
    //  RENDER LOOP
    // ─────────────────────────────────────────────────────────────
    let vrActive = false;

    (function animate() {
      requestAnimationFrame(animate);
      if (vrActive) {
        renderStereo();
      } else {
        renderer.setScissorTest(false);
        renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.render(scene, camera);
      }
    })();

    // ─────────────────────────────────────────────────────────────
    //  ENTER VR BUTTON
    // ─────────────────────────────────────────────────────────────
    btnEl.addEventListener('click', async () => {
      btnEl.disabled = true;

      // iOS 13+ requires explicit permission for gyroscope
      if (
        typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function'
      ) {
        let permission;
        try {
          permission = await DeviceOrientationEvent.requestPermission();
        } catch (e) {
          alert('Could not request motion access. Try again.');
          btnEl.disabled = false;
          return;
        }

        if (permission !== 'granted') {
          alert(
            'Motion access was denied.\n\n' +
            'Go to Settings → Safari → Motion & Orientation Access and enable it, then reload this page.'
          );
          btnEl.disabled = false;
          return;
        }
      }

      // Start listening to gyroscope
      window.addEventListener('deviceorientation', onOrientation, true);

      // Attempt fullscreen (Android respects this; iOS Safari ignores, that\'s fine)
      try { await document.documentElement.requestFullscreen?.(); } catch (_) {}

      // Attempt landscape lock (best-effort)
      try { await screen.orientation?.lock?.('landscape'); } catch (_) {}

      // Show VR UI
      document.getElementById('overlay').style.display   = 'none';
      document.getElementById('divider').style.display   = 'block';
      document.getElementById('hud').style.display       = 'block';

      vrActive = true;

      // Hide HUD tip after 4 seconds
      setTimeout(() => {
        document.getElementById('hud').style.display = 'none';
      }, 4000);
    });

    // ─────────────────────────────────────────────────────────────
    //  RESIZE
    // ─────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  </script>
</body>
</html>
