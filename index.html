<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Museum VR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { background: #000; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    
    #ios-permission-overlay {
      position: fixed; inset: 0; background: #0a0a0a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; color: #fff; text-align: center;
    }
    #ios-permission-overlay h1 { font-size: 24px; letter-spacing: 2px; }
    #ios-permission-overlay p { color: #888; font-size: 14px; margin-bottom: 20px; max-width: 280px;}
    #start-btn {
      background: #fff; color: #000; border: none; border-radius: 50px;
      padding: 16px 40px; font-size: 16px; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="ios-permission-overlay">
    <h1>🏛️ Museum VR</h1>
    <p>Tap below to enable motion sensors, then tap the VR Goggles icon in the bottom right corner.</p>
    <button id="start-btn">Enable Motion Access</button>
  </div>

  <a-scene 
    device-orientation-permission-ui="enabled: false"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;">
    
    <a-assets>
      <a-asset-item id="museum" src="https://raw.githubusercontent.com/jappy201/museum-vr/main/ClaudeFinalCompress2.glb"></a-asset-item>
    </a-assets>

    <a-entity gltf-model="#museum" position="0 0 0" scale="1 1 1"></a-entity>

    <a-entity position="0 1.6 10">
      <a-camera look-controls></a-camera>
    </a-entity>

    <a-light type="ambient" intensity="2.0"></a-light>
    <a-light type="directional" position="5 10 5" intensity="0.8"></a-light>

  </a-scene>

  <script>
    // 3. The iOS Safari Unlock Script
    const btn = document.getElementById('start-btn');
    const overlay = document.getElementById('ios-permission-overlay');

    btn.addEventListener('click', async () => {
      // Ask Apple for Gyroscope Permissions
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== 'granted') {
            alert('Safari motion access denied. Settings → Safari → Motion & Orientation Access.');
            return;
          }
        } catch (e) {
          alert('Error requesting motion access.');
          return;
        }
      }
      
      // Remove the overlay so you can click the VR icon
      overlay.style.display = 'none';
    });
  </script>

</body>
</html>
