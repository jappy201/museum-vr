<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Museum VR</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dim: rgba(201,168,76,0.3);
      --dark: #080808;
      --text: #f0ead8;
      --text-muted: rgba(240,234,216,0.5);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--dark); overflow: hidden; font-family: "Cormorant Garamond", Georgia, serif; }

    #overlay {
      position: fixed; inset: 0; background: var(--dark);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0; z-index: 999; color: var(--text); text-align: center;
      padding: 24px 20px 32px; overflow-y: auto;
    }
    .rule {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-bottom: 20px; flex-shrink: 0;
    }
    .museum-label {
      font-family: "Cinzel", serif; font-size: 9px; letter-spacing: 6px;
      color: var(--gold); text-transform: uppercase; margin-bottom: 12px; flex-shrink: 0;
    }
    #overlay h1 {
      font-family: "Cinzel", serif; font-size: clamp(20px, 5vw, 28px);
      font-weight: 400; letter-spacing: 3px; color: var(--text);
      line-height: 1.3; margin-bottom: 6px; flex-shrink: 0;
    }
    .subtitle {
      font-size: 13px; font-style: italic; color: var(--text-muted);
      margin-bottom: 28px; line-height: 1.6; flex-shrink: 0;
    }
    #cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; flex-shrink: 0; }
    .card {
      position: relative; width: 100%; height: 160px; border-radius: 4px;
      overflow: hidden; cursor: pointer; border: 1px solid var(--gold-dim);
      transition: border-color 0.3s, transform 0.2s;
    }
    .card:active { transform: scale(0.98); }
    .card.disabled { opacity: 0.45; cursor: default; pointer-events: none; }
    .card-bg {
      position: absolute; inset: 0; background-size: cover; background-position: center;
      transition: transform 0.6s ease; filter: brightness(0.55);
    }
    .card:hover .card-bg { transform: scale(1.04); filter: brightness(0.65); }
    .card-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 55%, transparent 100%);
    }
    .card-content {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      justify-content: flex-end; padding: 16px 18px; text-align: left;
    }
    .card-eyebrow {
      font-family: "Cinzel", serif; font-size: 8px; letter-spacing: 4px;
      color: var(--gold); text-transform: uppercase; margin-bottom: 5px;
    }
    .card-title {
      font-family: "Cinzel", serif; font-size: clamp(13px, 3.5vw, 16px);
      font-weight: 600; color: #fff; line-height: 1.3; margin-bottom: 10px;
    }
    .card-btn {
      display: inline-flex; align-items: center; gap: 7px; background: transparent;
      border: 1px solid var(--gold); color: var(--gold); font-family: "Cinzel", serif;
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      padding: 7px 14px; border-radius: 2px; cursor: pointer;
      transition: background 0.2s, color 0.2s; pointer-events: none;
    }
    .card:hover .card-btn { background: var(--gold); color: #000; }
    .card::before, .card::after {
      content: ""; position: absolute; width: 14px; height: 14px;
      border-color: var(--gold); border-style: solid; z-index: 2; opacity: 0.7;
    }
    .card::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
    .card.loading .card-bg { background-image: none !important; background-color: #1a1a1a; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0%,100%{filter:brightness(0.4);}50%{filter:brightness(0.6);} }
    #status { font-size: 11px; font-style: italic; color: var(--text-muted); margin-top: 18px; letter-spacing: 1px; flex-shrink: 0; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
    .museum-label { animation: fadeUp 0.6s ease both; }
    #overlay h1   { animation: fadeUp 0.6s 0.1s ease both; }
    .subtitle     { animation: fadeUp 0.6s 0.2s ease both; }
    #cards        { animation: fadeUp 0.6s 0.35s ease both; }
    #status       { animation: fadeUp 0.6s 0.5s ease both; }

    #divider {
      position: fixed; top: 0; left: 50%; width: 2px; height: 100%;
      background: #000; z-index: 5; display: none; pointer-events: none;
    }
    #hud {
      position: fixed; bottom: 24px; width: 100%; text-align: center;
      color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 2px;
      z-index: 10; display: none; pointer-events: none;
      font-family: "Cinzel", serif; text-transform: uppercase;
    }

/* Microscopic, ultra-dim back button to hide from VR lens distortion */
    #back-btn {
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      z-index: 9999;
      display: none;
      background: rgba(0,0,0,0.1); /* Almost entirely transparent */
      border: 1px solid rgba(201,168,76,0.15); /* Barely visible gold border */
      border-top: none;
      color: rgba(201,168,76,0.2); /* Barely visible gold text */
      font-family: "Cinzel", serif;
      font-size: 8px; /* Extremely small text */
      letter-spacing: 1px; text-transform: uppercase;
      padding: 3px 10px; /* Shrunk down to hug the text tightly */
      cursor: pointer;
      border-radius: 0 0 6px 6px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      /* Removed min-width so it stops stretching across your peripheral vision */
    }
    canvas { display: block; }
  </style>
</head>
<body>

  <div id="overlay">
    <div class="rule"></div>
    <p class="museum-label">Virtual Reality Experience</p>
    <h1>Houston Museum<br>of Natural Science</h1>
    <p class="subtitle">Select an exhibit to begin your journey</p>
    <div id="cards">
      <div class="card loading" id="card1">
        <div class="card-bg" id="bg1"></div>
        <div class="card-gradient"></div>
        <div class="card-content">
          <p class="card-eyebrow">Exhibit I</p>
          <p class="card-title">Hall of Ancient Egypt</p>
          <button class="card-btn">Enter Exhibition ›</button>
        </div>
      </div>
      <div class="card loading" id="card2">
        <div class="card-bg" id="bg2"></div>
        <div class="card-gradient"></div>
        <div class="card-content">
          <p class="card-eyebrow">Exhibit II</p>
          <p class="card-title">Morian Hall of Paleontology</p>
          <button class="card-btn">Enter Exhibition ›</button>
        </div>
      </div>
    </div>
    <p id="status">Connecting…</p>
  </div>

  <div id="divider"></div>
  <div id="hud">Move your head to look around</div>
  <button id="back-btn">← Change Exhibit</button>

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const effect = new StereoEffect(renderer);
    effect.setSize(window.innerWidth, window.innerHeight);
    effect.setEyeSeparation(0.005);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    scene.add(new THREE.AmbientLight(0xffffff, 2.0));
    const key = new THREE.DirectionalLight(0xffffff, 0.8);
    key.position.set(5, 10, 5); scene.add(key);

    const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.01, 1000);
    let baseCamPos = new THREE.Vector3(0, 0, 0);

    const camQuat = new THREE.Quaternion();
    const orient  = new THREE.Euler();
    const worldAdjust = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));
    const screenQ = new THREE.Quaternion();
    const Z_AXIS  = new THREE.Vector3(0, 0, 1);

    function onOrientation(evt) {
      if (evt.alpha == null) return;
      orient.set(
        THREE.MathUtils.degToRad(evt.beta  || 0),
        THREE.MathUtils.degToRad(evt.alpha || 0),
        THREE.MathUtils.degToRad(-(evt.gamma || 0)), "YXZ"
      );
      camQuat.setFromEuler(orient);
      camQuat.multiply(worldAdjust);
      const angle = window.screen?.orientation?.angle || 0;
      screenQ.setFromAxisAngle(Z_AXIS, -THREE.MathUtils.degToRad(angle));
      camQuat.multiply(screenQ);
    }

    let vrActive = false;
    (function animate() {
      requestAnimationFrame(animate);
      camera.quaternion.copy(camQuat);
      camera.position.copy(baseCamPos);
      if (vrActive) {
        effect.render(scene, camera);
      } else {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.render(scene, camera);
      }
    })();

    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath("https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/");
    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);

    const statusEl = document.getElementById("status");
    const card1    = document.getElementById("card1");
    const card2    = document.getElementById("card2");
    const backBtn  = document.getElementById("back-btn");
    const overlay  = document.getElementById("overlay");
    const divider  = document.getElementById("divider");
    const hud      = document.getElementById("hud");

    loader.load(GLB_URL,
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(1.0);
        const box = new THREE.Box3().setFromObject(model);
        model.position.y = -box.min.y;
        scene.add(model);
        statusEl.textContent = "✦ Scan ready — select an exhibit above";
        card1.classList.remove("loading");
        card2.classList.remove("loading");
      },
      (xhr) => {
        statusEl.textContent = xhr.total
          ? `Loading scan… ${Math.round(xhr.loaded / xhr.total * 100)}%`
          : `Loading scan… ${(xhr.loaded / 1048576).toFixed(1)} MB`;
      },
      (err) => { statusEl.textContent = "⚠ Failed to load scan"; console.error(err); }
    );

    async function enterVRMode(exhibitNumber) {
      if (card1.classList.contains("loading")) return;
      card1.classList.add("disabled");
      card2.classList.add("disabled");

      baseCamPos.set(
        exhibitNumber === 1 ? 0     : 4.026,
        2.2,
        exhibitNumber === 1 ? 10   : -8.637
      );

      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function") {
        let perm;
        try { perm = await DeviceOrientationEvent.requestPermission(); }
        catch (e) {
          alert("Could not request motion access. Try again.");
          card1.classList.remove("disabled"); card2.classList.remove("disabled"); return;
        }
        if (perm !== "granted") {
          alert("Motion access denied.\n\nSettings → Safari → Motion & Orientation Access → enable.");
          card1.classList.remove("disabled"); card2.classList.remove("disabled"); return;
        }
      }

      window.addEventListener("deviceorientation", onOrientation, true);
      try { await document.documentElement.requestFullscreen?.(); } catch (_) {}
      try { await screen.orientation?.lock?.("landscape"); }         catch (_) {}

      overlay.style.display  = "none";
      divider.style.display  = "block";
      hud.style.display      = "block";
      backBtn.style.display  = "block";
      vrActive = true;

      setTimeout(() => { hud.style.display = "none"; }, 4000);
    }

    function exitVR() {
      vrActive = false;
      overlay.style.display  = "flex";
      divider.style.display  = "none";
      hud.style.display      = "none";
      backBtn.style.display  = "none";
      card1.classList.remove("disabled");
      card2.classList.remove("disabled");
      try { document.exitFullscreen?.(); }     catch (_) {}
      try { screen.orientation?.unlock?.(); } catch (_) {}
    }

    card1.addEventListener("click", () => enterVRMode(1));
    card2.addEventListener("click", () => enterVRMode(2));
    backBtn.addEventListener("click", exitVR);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      effect.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
